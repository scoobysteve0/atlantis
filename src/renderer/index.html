<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlantis v3.3 - Projects + Iterations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <h1>Atlantis</h1>
        <div class="topbar-actions">
          <button id="settings-button" class="icon-button" type="button" aria-label="Settings" title="Settings">⚙</button>
          <span class="version-pill">v3.3</span>
        </div>
      </header>

      <nav class="tabs" id="tabs"></nav>

      <section class="view panel" id="dashboard-view" aria-label="Projects Workspace">
        <div class="view-head">
          <h2>Projects</h2>
          <span id="last-synced" class="sync-pill">Last Synced: Waiting for live data…</span>
        </div>
        <div class="dashboard-grid">
          <aside class="agent-sidebar" id="mission-sidebar">
            <div class="sidebar-head">
              <h3>Agents</h3>
              <button id="mission-sidebar-toggle" class="icon-button sidebar-toggle" type="button" aria-label="Collapse Agents" title="Collapse">◀</button>
            </div>
            <ul id="agent-status-list"></ul>
          </aside>

          <div class="projects-shell">
            <section class="projects-active-panel">
              <h3 class="section-title">Active Projects</h3>
              <div class="project-grid" id="project-board"></div>
            </section>

            <section class="ideas-panel iterations-lab">
              <h3 class="section-title">Iterations <span class="detail-sub">Internal / Self-Driven</span></h3>
              <ul id="iterations-list" class="ideas-list"></ul>
            </section>

            <section class="project-detail" id="project-detail"></section>
          </div>
        </div>
      </section>

      <section class="view panel is-hidden" id="iterations-view" aria-label="Iterations Workspace">
        <h2>Iterations</h2>
        <p class="detail-sub">Internal / Self-Driven projects and lessons-learned improvements.</p>
        <ul id="iterations-tab-list" class="ideas-list"></ul>
      </section>
    </main>

    <div class="modal-backdrop is-hidden" id="app-modal" role="dialog" aria-modal="true" aria-labelledby="app-modal-title">
      <div class="modal-panel" id="app-modal-panel">
        <h3 id="app-modal-title">Status</h3>
        <p id="app-modal-message">Action complete.</p>
        <button id="app-modal-close" type="button">Close</button>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
