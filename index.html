<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlantis Iterations</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: #0b1020; color: #e8ecff; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 8px; }
    p { color: #b9c0e6; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 20px; }
    .card { border: 1px solid #2a3567; border-radius: 14px; padding: 16px; background: #131a33; }
    a { color: #7cc6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    img { width: 100%; max-height: 580px; object-fit: contain; border-radius: 10px; border: 1px solid #2a3567; background: #0a0f1f; }
    .meta { font-size: 13px; color: #9ea7d6; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Atlantis Iteration Board</h1>
    <p>Public view of current concept iterations and planning artifacts.</p>

    <div class="grid">
      <section class="card">
        <h2>v1.4</h2>
        <p><a href="./atlantis-ideas-v1.4.png" target="_blank">Open full image</a></p>
        <img src="./atlantis-ideas-v1.4.png" alt="Atlantis ideas v1.4" />
      </section>

      <section class="card">
        <h2>v1.5</h2>
        <p><a href="./atlantis-ideas-v1.5.png" target="_blank">Open full image</a></p>
        <img src="./atlantis-ideas-v1.5.png" alt="Atlantis ideas v1.5" />
      </section>

      <section class="card">
        <h2>v1.6</h2>
        <p><a href="./atlantis-ideas-v1.6.png" target="_blank">Open full image</a></p>
        <img src="./atlantis-ideas-v1.6.png" alt="Atlantis ideas v1.6" />
      </section>
    </div>

    <p class="meta">Hosted on GitHub Pages from <code>scoobysteve0/atlantis</code>.</p>
  </div>
</body>
</html>
