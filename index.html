<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlantis v2.0 - Desktop Complete</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <h1>Atlantis</h1>
        <div class="topbar-actions">
          <button id="settings-button" class="icon-button" type="button" aria-label="Settings" title="Settings">⚙</button>
          <span class="version-pill">v2.0</span>
        </div>
      </header>

      <nav class="tabs" id="tabs"></nav>

      <section class="view panel" id="guardrails-view" aria-label="Guardrails">
        <h2>Guardrails</h2>
        <div class="guardrail-card">
          <h3>1) Naming Validation</h3>
          <label for="task-name">Task name</label>
          <input id="task-name" type="text" placeholder="format: TEAM-ACTION-SCOPE" />
          <p id="name-status" class="status-text">Waiting for input…</p>
        </div>
        <div class="guardrail-card">
          <h3>2) Checklist</h3>
          <ul id="checklist" class="checklist"></ul>
        </div>
        <div class="guardrail-card">
          <h3>3) Proof Gate</h3>
          <label for="proof-link">Proof URL</label>
          <input id="proof-link" type="url" placeholder="https://..." />
          <button id="proof-button" type="button">Validate Guardrails</button>
          <p id="proof-status" class="status-text">Blocked until all checks pass.</p>
        </div>
      </section>

      <section class="view panel is-hidden" id="dashboard-view" aria-label="Project Board Dashboard">
        <h2>Project Board</h2>
        <div class="dashboard-grid">
          <aside class="agent-sidebar" id="mission-sidebar">
            <div class="sidebar-head">
              <h3>Mission Control</h3>
              <button id="mission-sidebar-toggle" class="icon-button sidebar-toggle" type="button" aria-label="Collapse Mission Control" title="Collapse">◀</button>
            </div>
            <ul id="agent-status-list"></ul>
          </aside>
          <div class="board" id="project-board"></div>
        </div>
      </section>

      <section class="view panel is-hidden" id="mission-view" aria-label="Mission Control">
        <h2>Mission Control</h2>
        <div class="mission-toolbar">
          <label class="switch-row" for="auto-advance-toggle">
            <input id="auto-advance-toggle" type="checkbox" />
            Auto-Advance
          </label>
          <button id="log-activity-button" type="button">Simulate Agent Activity</button>
        </div>
        <div class="live-log" id="live-log" aria-live="polite"></div>
      </section>
    </main>

    <div class="modal-backdrop is-hidden" id="app-modal" role="dialog" aria-modal="true" aria-labelledby="app-modal-title">
      <div class="modal-panel" id="app-modal-panel">
        <h3 id="app-modal-title">Status</h3>
        <p id="app-modal-message">Action complete.</p>
        <button id="app-modal-close" type="button">Close</button>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
