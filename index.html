<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlantis v1.4 - Guardrails</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <h1>Atlantis</h1>
        <span class="version-pill">v1.4</span>
      </header>

      <section class="panel" id="guardrails-view" aria-label="Guardrails">
        <h2>Guardrails</h2>

        <div class="guardrail-card">
          <h3>1) Naming Validation</h3>
          <label for="task-name">Task name</label>
          <input id="task-name" type="text" placeholder="format: TEAM-ACTION-SCOPE" />
          <p id="name-status" class="status-text">Waiting for input…</p>
        </div>

        <div class="guardrail-card">
          <h3>2) Checklist</h3>
          <ul id="checklist" class="checklist"></ul>
        </div>

        <div class="guardrail-card">
          <h3>3) Proof Gate</h3>
          <label for="proof-link">Proof URL</label>
          <input id="proof-link" type="url" placeholder="https://..." />
          <button id="proof-button" type="button">Validate Guardrails</button>
          <p id="proof-status" class="status-text">Blocked until all checks pass.</p>
        </div>
      </section>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
